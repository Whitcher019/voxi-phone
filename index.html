<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOXI — Softphone</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.voximplant.com/edge/voximplant.min.js"></script>
<style>
  :root {
    --bg:        #0a0b0d;
    --surface:   #111318;
    --surface2:  #181b22;
    --border:    #252830;
    --accent:    #00e5ff;
    --accent2:   #00ff9d;
    --danger:    #ff3b5c;
    --text:      #e2e4ea;
    --muted:     #555a6b;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Barlow', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px);
    pointer-events: none;
    z-index: 0;
  }

  .phone {
    position: relative;
    z-index: 1;
    width: 320px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 0 60px #00e5ff0a, 0 0 0 1px #00e5ff08;
  }

  /* Header */
  .header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.online  { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
  .status-dot.calling { background: var(--accent);  box-shadow: 0 0 8px var(--accent);  animation: pulse 1s infinite; }
  .status-dot.active  { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 1.5s infinite; }
  .status-dot.error   { background: var(--danger);  box-shadow: 0 0 8px var(--danger);  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* Display */
  .display {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }

  .status-text {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .number-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 22px;
    color: var(--text);
    letter-spacing: 2px;
    caret-color: var(--accent);
  }

  .number-input::placeholder { color: var(--muted); }

  .timer {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-top: 6px;
    min-height: 16px;
    letter-spacing: 1px;
  }

  /* Dialpad */
  .dialpad {
    padding: 16px 18px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .key {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px 0;
    cursor: pointer;
    text-align: center;
    transition: background 0.1s, border-color 0.1s, transform 0.1s;
    user-select: none;
  }

  .key:hover  { background: #1e2230; border-color: #353a4a; }
  .key:active { background: #252a38; transform: scale(0.96); }

  .key .digit {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--text);
    line-height: 1;
  }

  .key .sub {
    font-family: var(--sans);
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 3px;
    text-transform: uppercase;
  }

  .key.special .digit { color: var(--muted); font-size: 16px; }

  /* Action buttons */
  .actions {
    padding: 0 18px 18px;
    display: grid;
    grid-template-columns: 1fr 56px;
    gap: 8px;
  }

  .btn-call {
    background: var(--accent2);
    border: none;
    border-radius: 2px;
    padding: 15px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 3px;
    color: #000;
    font-weight: 600;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-call:hover   { opacity: 0.85; }
  .btn-call:active  { transform: scale(0.98); }
  .btn-call.hangup  { background: var(--danger); color: #fff; }
  .btn-call:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-del {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--muted);
    transition: color 0.2s, border-color 0.2s;
  }

  .btn-del:hover { color: var(--danger); border-color: var(--danger); }

  /* Log */
  .log {
    border-top: 1px solid var(--border);
    padding: 12px 18px;
    max-height: 90px;
    overflow-y: auto;
  }

  .log::-webkit-scrollbar { width: 3px; }
  .log::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb { background: var(--border); }

  .log-line {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    line-height: 1.8;
    letter-spacing: 0.5px;
  }

  .log-line.info  { color: var(--accent); }
  .log-line.ok    { color: var(--accent2); }
  .log-line.error { color: var(--danger); }

  /* Login overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: var(--surface);
    z-index: 10;
    display: flex;
    flex-direction: column;
    padding: 24px 18px;
    gap: 12px;
  }

  .overlay h2 {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }

  .btn-login {
    background: var(--accent);
    border: none;
    border-radius: 2px;
    padding: 13px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: #000;
    font-weight: 600;
    text-transform: uppercase;
    margin-top: 4px;
    transition: opacity 0.2s;
  }

  .btn-login:hover { opacity: 0.85; }

  .overlay-note {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.6;
    font-family: var(--sans);
  }
</style>
</head>
<body>

<div class="phone">

  <!-- Login overlay -->
  <div class="overlay" id="overlay">
    <h2>VOXI — Connect</h2>
    <div class="field">
      <label>Username</label>
      <input id="inp-user" type="text" value="strawhat4" placeholder="strawhat4">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="inp-pass" type="password" placeholder="TU_PASSWORD_AQUI">
    </div>
    <div class="field">
      <label>Account</label>
      <input id="inp-account" type="text" value="strawhat4" placeholder="strawhat4">
    </div>
    <div class="field">
      <label>Application</label>
      <input id="inp-app" type="text" value="jjbot4" placeholder="jjbot4">
    </div>
    <button class="btn-login" onclick="doLogin()">Connect</button>
    <p class="overlay-note">Credentials are never stored or sent anywhere except to VoxImplant servers directly.</p>
  </div>

  <!-- Header -->
  <div class="header">
    <span class="logo">VOXI</span>
    <div class="status-dot" id="dot"></div>
  </div>

  <!-- Display -->
  <div class="display">
    <div class="status-text" id="status-text">ready</div>
    <input class="number-input" id="number" type="tel" placeholder="+1 (000) 000-0000" maxlength="20">
    <div class="timer" id="timer"></div>
  </div>

  <!-- Dialpad -->
  <div class="dialpad" id="dialpad">
    <div class="key" onclick="press('1')"><div class="digit">1</div><div class="sub">&nbsp;</div></div>
    <div class="key" onclick="press('2')"><div class="digit">2</div><div class="sub">ABC</div></div>
    <div class="key" onclick="press('3')"><div class="digit">3</div><div class="sub">DEF</div></div>
    <div class="key" onclick="press('4')"><div class="digit">4</div><div class="sub">GHI</div></div>
    <div class="key" onclick="press('5')"><div class="digit">5</div><div class="sub">JKL</div></div>
    <div class="key" onclick="press('6')"><div class="digit">6</div><div class="sub">MNO</div></div>
    <div class="key" onclick="press('7')"><div class="digit">7</div><div class="sub">PQRS</div></div>
    <div class="key" onclick="press('8')"><div class="digit">8</div><div class="sub">TUV</div></div>
    <div class="key" onclick="press('9')"><div class="digit">9</div><div class="sub">WXYZ</div></div>
    <div class="key special" onclick="press('*')"><div class="digit">*</div><div class="sub">&nbsp;</div></div>
    <div class="key" onclick="press('0')"><div class="digit">0</div><div class="sub">+</div></div>
    <div class="key special" onclick="press('#')"><div class="digit">#</div><div class="sub">&nbsp;</div></div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn-call" id="btn-call" onclick="toggleCall()">CALL</button>
    <button class="btn-del" onclick="deleteLast()">⌫</button>
  </div>

  <!-- Log -->
  <div class="log" id="log"></div>

</div>

<script>
// ─────────────────────────────────────────────
//  ESTADO
// ─────────────────────────────────────────────
let sdk      = null;
let currentCall = null;
let callActive  = false;
let timerInt    = null;
let seconds     = 0;

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────
function setStatus(text, type) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('dot');
  dot.className = 'status-dot' + (type ? ' ' + type : '');
}

function addLog(msg, type) {
  const log  = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line' + (type ? ' ' + type : '');
  const time = new Date().toLocaleTimeString('en', { hour12: false });
  line.textContent = time + '  ' + msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function startTimer() {
  seconds  = 0;
  timerInt = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInt);
  document.getElementById('timer').textContent = '';
}

// ─────────────────────────────────────────────
//  LOGIN
// ─────────────────────────────────────────────
let sdkReady = false;

function doLogin() {
  const user    = document.getElementById('inp-user').value.trim();
  const pass    = document.getElementById('inp-pass').value.trim();
  const account = document.getElementById('inp-account').value.trim();
  const app     = document.getElementById('inp-app').value.trim();

  if (!pass) { alert('Enter your SIP password'); return; }

  // Deshabilitar botón para evitar doble clic
  document.querySelector('.btn-login').disabled = true;
  document.querySelector('.btn-login').textContent = 'CONNECTING...';

  addLog('Connecting to VoxImplant...', 'info');

  sdk = VoxImplant.getInstance();

  // Si el SDK ya estaba listo, ir directo al login
  if (sdkReady) {
    addLog('SDK ready — logging in', 'info');
    sdk.login(user + '@' + app + '.' + account + '.voximplant.com', pass);
    return;
  }

  sdk.on(VoxImplant.Events.SDKReady, () => {
    sdkReady = true;
    addLog('SDK ready — logging in', 'info');
    sdk.login(user + '@' + app + '.' + account + '.voximplant.com', pass);
  });

  sdk.on(VoxImplant.Events.AuthResult, (e) => {
    if (e.result) {
      addLog('Connected as ' + user, 'ok');
      setStatus('online', 'online');
      document.getElementById('overlay').style.display = 'none';
    } else {
      addLog('Auth failed: ' + e.code, 'error');
      setStatus('auth error', 'error');
      // Re-habilitar botón si falla
      document.querySelector('.btn-login').disabled = false;
      document.querySelector('.btn-login').textContent = 'CONNECT';
    }
  });

  // Llamada entrante
  sdk.on(VoxImplant.Events.IncomingCall, (e) => {
    currentCall = e.call;
    addLog('Incoming call from ' + e.call.number(), 'info');
    setStatus('incoming...', 'calling');
    document.getElementById('number').value = e.call.number();
    attachCallEvents(currentCall);
    currentCall.answer();
  });

  try {
    sdk.init({
      micRequired:   true,
      progressTones: true,
      showDebugInfo:  false,
    });
  } catch(e) {
    // SDK ya inicializado — ir directo al login
    sdkReady = true;
    addLog('SDK ready — logging in', 'info');
    sdk.login(user + '@' + app + '.' + account + '.voximplant.com', pass);
  }
}

// ─────────────────────────────────────────────
//  EVENTOS DE LLAMADA
// ─────────────────────────────────────────────
function attachCallEvents(call) {
  call.on(VoxImplant.CallEvents.Connected, () => {
    callActive = true;
    addLog('Call connected', 'ok');
    setStatus('in call', 'active');
    document.getElementById('btn-call').textContent = 'HANG UP';
    document.getElementById('btn-call').classList.add('hangup');
    startTimer();
  });

  call.on(VoxImplant.CallEvents.Disconnected, () => {
    callActive = false;
    addLog('Call ended', '');
    setStatus('online', 'online');
    document.getElementById('btn-call').textContent = 'CALL';
    document.getElementById('btn-call').classList.remove('hangup');
    stopTimer();
    currentCall = null;
  });

  call.on(VoxImplant.CallEvents.Failed, (e) => {
    callActive = false;
    addLog('Call failed: ' + e.reason, 'error');
    setStatus('online', 'online');
    document.getElementById('btn-call').textContent = 'CALL';
    document.getElementById('btn-call').classList.remove('hangup');
    stopTimer();
    currentCall = null;
  });

  call.on(VoxImplant.CallEvents.ProgressToneStart, () => {
    addLog('Ringing...', 'info');
    setStatus('ringing', 'calling');
  });
}

// ─────────────────────────────────────────────
//  MARCAR / COLGAR
// ─────────────────────────────────────────────
function toggleCall() {
  if (callActive && currentCall) {
    currentCall.hangup();
    return;
  }

  const number = document.getElementById('number').value.replace(/\s/g, '');
  if (!number) { addLog('Enter a number first', 'error'); return; }
  if (!sdk)    { addLog('Not connected', 'error'); return; }

  addLog('Calling ' + number + '...', 'info');
  setStatus('calling', 'calling');

  currentCall = sdk.call({
    number:      number,
    // DTMF via RFC2833 — forzado correctamente
    sendTone:    true,
    video:       false,
    receiveVideo: false,
  });

  attachCallEvents(currentCall);
}

// ─────────────────────────────────────────────
//  TECLADO DTMF
//  Envía RFC2833 correctamente durante la llamada
// ─────────────────────────────────────────────
function press(digit) {
  // Si hay llamada activa → enviar DTMF
  if (callActive && currentCall) {
    currentCall.sendTone(digit);
    addLog('DTMF sent: ' + digit, 'info');
  } else {
    // Si no hay llamada → agregar al número
    document.getElementById('number').value += digit;
  }
}

function deleteLast() {
  const inp = document.getElementById('number');
  inp.value = inp.value.slice(0, -1);
}

// Teclado físico también funciona
document.addEventListener('keydown', (e) => {
  const keys = '0123456789*#';
  if (keys.includes(e.key) && !e.target.matches('input')) {
    press(e.key);
  }
  if (e.key === 'Backspace' && !e.target.matches('input')) {
    deleteLast();
  }
  if (e.key === 'Enter') {
    toggleCall();
  }
});
</script>
</body>
</html>
